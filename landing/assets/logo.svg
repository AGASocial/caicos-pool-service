<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="dropletGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#0D7C8F"/>
    </linearGradient>
    <filter id="dropGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Concentric neural network rings -->
  <circle cx="24" cy="24" r="22" stroke="#0D7C8F" stroke-width="2"/>
  <circle cx="24" cy="24" r="15" stroke="#0D7C8F" stroke-width="1.5" opacity="0.7"/>
  <circle cx="24" cy="24" r="8"  stroke="#0D7C8F" stroke-width="1.5" opacity="0.5"/>

  <!-- Outer ring nodes -->
  <circle cx="24" cy="3"  r="2" fill="#0D7C8F"/>
  <circle cx="42" cy="13" r="2" fill="#0D7C8F"/>
  <circle cx="45" cy="24" r="2" fill="#0D7C8F"/>
  <circle cx="42" cy="35" r="2" fill="#0D7C8F"/>
  <circle cx="24" cy="45" r="2" fill="#0D7C8F"/>
  <circle cx="6"  cy="35" r="2" fill="#0D7C8F"/>
  <circle cx="3"  cy="24" r="2" fill="#0D7C8F"/>
  <circle cx="6"  cy="13" r="2" fill="#0D7C8F"/>

  <!-- Water droplet -->
  <path d="M24 16 C19 21,17 25,17 28 C17 32,20 35,24 35 C28 35,31 32,31 28 C31 25,29 21,24 16 Z"
        fill="url(#dropletGrad)" filter="url(#dropGlow)"/>
  <ellipse cx="22" cy="21" rx="2" ry="3" fill="white" opacity="0.35"/>
</svg>
